<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>江北白板 - 正在跳转...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0a1612;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        .icon {
            width: 120px; height: 120px;
            border-radius: 28px;
            object-fit: cover;
            margin-bottom: 24px;
            box-shadow: 0 8px 40px rgba(46,204,113,0.2);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #2ecc71, #3498db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }
        p {
            color: rgba(255,255,255,0.5);
            font-size: 15px;
            margin-bottom: 20px;
        }
        .spinner {
            display: inline-block;
            width: 32px; height: 32px;
            border: 3px solid rgba(46,204,113,0.2);
            border-top-color: #2ecc71;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .link-btn {
            display: inline-block;
            padding: 10px 24px;
            background: rgba(46,204,113,0.1);
            border: 1px solid rgba(46,204,113,0.3);
            border-radius: 10px;
            color: #2ecc71;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
        }
        .link-btn:hover {
            background: rgba(46,204,113,0.2);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="fengmian.jpg" alt="江北白板" class="icon">
        <h1>江北白板</h1>
        <p><span class="spinner"></span>正在跳转到下载页面...</p>
        <a id="manual-link" href="#" class="link-btn">如果没自动跳转，点这里</a>
    </div>

    <!-- TODO: 替换下面的 URL 为你的腾讯云开发地址 -->
    <script>
        var TARGET_URL = "https://YOUR_TENCENT_CLOUD_URL_HERE";
        document.getElementById('manual-link').href = TARGET_URL;

        setTimeout(function() {
            window.location.replace(TARGET_URL);
        }, 1500);
    </script>
</body>
</html>
